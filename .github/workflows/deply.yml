name: Deploy Mafia Bot to OCI VM

# Trigger the workflow on pushes to the main branch
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to OCI
    runs-on: ubuntu-latest # Use a standard Linux runner

    steps:
    # Step 1: Check out the repository code
    - name: Checkout code
      uses: actions/checkout@v4 # Checks out your repository onto the runner

    # Step 2: Set up SSH Agent to use your private key
    - name: Set up SSH key
      uses: webfactory/ssh-agent@v0.7.0 # Action to manage SSH keys securely
      with:
        ssh-private-key: ${{ secrets.OCI_SSH_PRIVATE_KEY }} # Use the secret

    # Step 3: Add OCI VM's host key to known_hosts to avoid interactive prompt
    # This is important for non-interactive SSH sessions
    - name: Add known hosts
      run: ssh-keyscan -H ${{ secrets.OCI_SSH_HOST }} >> ~/.ssh/known_hosts

    # Step 4: Connect to VM via SSH and execute deployment commands
    - name: Deploy to VM
      run: |
        ssh ${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_SSH_HOST }} << 'EOF'
          # --- Commands executed ON the OCI VM ---

          # 1. Navigate to your project directory (adjust path if necessary)
          echo "Navigating to bot directory..."
          cd ~/mafia-bot || exit 1 # Use the actual path to your bot folder; exit if cd fails

          # 2. Pull the latest changes from the main branch
          echo "Pulling latest code from Git..."
          git pull origin main

          # 3. Activate your virtual environment
          echo "Activating virtual environment..."
          source .venv/bin/activate || { echo "Failed to activate venv"; exit 1; }

          # 4. Install/update dependencies
          echo "Installing/updating dependencies..."
          pip install -r requirements.txt

          # 5. Restart the bot using your process manager
          echo "Restarting bot process..."
          # Example using pm2 (replace 'mafia-bot' with your pm2 process name)
          pm2 restart mafia-bot || pm2 start bot.py --name mafia-bot --interpreter python3
          # OR Example using systemd (replace 'mafia-bot.service' with your service name)
          # sudo systemctl restart mafia-bot.service

          echo "Deployment script finished."
        EOF # End of the here-document for SSH commands