# This is the name of our workflow. It will show up in the "Actions" tab of your GitHub repository.
name: Test and Deploy Mafia Bot

# This section defines the trigger for our workflow.
on:
  # We want this to run every time someone pushes new code...
  push:
    # ...but ONLY if the push is to the 'main' or 'test' branches.
    branches:
      - main
      - test_1

# This section defines the jobs that our workflow will run.
jobs:
  # --- JOB 1: RUN THE TESTS ---
  # This job's only purpose is to ensure our code is healthy.
  test:
    # It will run on a standard, fresh Linux virtual machine provided by GitHub.
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository code so the runner has access to it.
      - name: Check out repository code
        uses: actions/checkout@v4

      # Step 2: Set up the specific version of Python we need.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      # Step 2.5: Create a config.py file from our secrets.
      - name: Create config.py
        run: |
          echo "BOT_TOKEN = '${{ secrets.BOT_TOKEN }}'" > config.py
          # IMPORTANT: Add echo lines here for ALL variables from config_template.py
          # This ensures the test environment perfectly mirrors a real run.
          echo "ANNOUNCEMENT_CHANNEL_ID = 123456789012345678" >> config.py
          echo "SIGN_UP_HERE_CHANNEL_ID = 123456789012345678" >> config.py
          echo "RULES_AND_ROLES_CHANNEL_ID = 123456789012345678" >> config.py
          echo "STORIES_CHANNEL_ID = 123456789012345678" >> config.py
          echo "VOTING_CHANNEL_ID = 123456789012345678" >> config.py
          echo "TALKY_TALKY_CHANNEL_ID = 123456789012345678" >> config.py
          echo "MOD_CHANNEL_ID = 123456789012345678" >> config.py
          echo "min_players = 6" >> config.py
          echo "signup_loop_interval_seconds = 15" >> config.py
          echo "game_loop_interval_seconds = 15" >> config.py
          echo "MAX_MISSED_VOTES = 2" >> config.py
          echo "REMINDER_POINTS = {60: '1 hour', 30: '30 minutes', 15: '15 minutes', 5: '5 minutes'}" >> config.py


      # Step 3: Install all the libraries listed in our requirements.txt file.
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run our entire unit test suite. If any test fails, this job will fail.
      - name: Run unit tests
        run: python -m unittest discover Tests

      # --- JOB 3: DEPLOY TO THE PRODUCTION SERVER (Using Manual Script) ---
  deploy-to-beta:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/test_1'
    steps:
      - name: Deploy to Beta VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BETA_HOST }}
          username: ${{ secrets.BETA_USERNAME }} 
          key: ${{ secrets.BETA_SSH_KEY }}
          script: |
            #!/bin/bash
            cd /home/opc/IC-Mafia-Bot/
            # Pull the latest changes from the 'test_1' branch
            git pull origin test_1
            # Activate virtual environment and install dependencies
            source .venv/bin/activate
            # Install dependencies from requirements.txt
            pip install -r requirements.txt
            # Kill any existing bot.py processes
            pkill -f "python bot.py" || true
            # Start bot.py in the background using nohup
            # 1. Redirect stdout AND stderr (2>&1) to nohup.out, run in background (&)
            nohup python bot.py > nohup.out 2>&1 &
            # 2. Disown the last background job, detaching it from this shell
            disown

  # --- JOB 3: DEPLOY TO THE PRODUCTION SERVER ---
  # This job will deploy our code to the main production virtual machine.
  deploy-to-main:
    runs-on: ubuntu-latest
    # It ALSO 'needs' the 'test' job to pass. We never deploy untested code.
    needs: test
    # CRITICAL: This 'if' condition ensures this job ONLY runs for pushes to the 'main' branch.
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Main VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
            host: ${{ secrets.MAIN_HOST }}
            username: ${{ secrets.MAIN_USERNAME }} 
            key: ${{ secrets.MAIN_SSH_KEY }}
            script: |
                cd /home/opc/IC-Mafia-Bot/
                git pull origin main
                # Activate virtual environment and install dependencies
                source .venv/bin/activate
                # Install dependencies from requirements.txt
                pip install -r requirements.txt
                
